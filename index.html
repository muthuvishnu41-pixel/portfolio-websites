<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Billing App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="page-header">
    <h1>Restaurant Billing</h1>
    <p>Simple menu, cart, and billing system</p>
  </header>

  <main class="layout">
    <section class="panel menu-panel">
      <h2>Menu</h2>
      <div id="menuGrid" class="menu-grid"></div>
    </section>

    <section class="panel cart-panel">
      <h2>Cart</h2>
      <div id="cartList" class="cart-list"></div>

      <div class="bill-summary">
        <div><span>Subtotal</span><strong id="subtotalAmount">Rs 0.00</strong></div>
        <div class="total-line"><span>Total</span><strong id="totalAmount">Rs 0.00</strong></div>
      </div>

      <div class="cart-actions">
        <button id="clearCartBtn" class="btn btn-secondary">Clear Cart</button>
        <button id="payNowBtn" class="btn btn-primary">Pay Now</button>
      </div>
    </section>
  </main>

  <section class="panel payment-panel">
    <h2>Payment</h2>
    <div id="paymentContent">
      <p class="muted">Click "Pay Now" to show QR code.</p>
    </div>
  </section>

  <section class="panel invoice-panel">
    <h2>Bill Invoice</h2>
    <div id="invoicePrintArea" class="invoice-content">
      <p class="muted">Complete payment to generate the bill.</p>
    </div>
    <button id="printBillBtn" class="btn btn-secondary" disabled>Print Bill</button>
  </section>

  <section class="panel report-panel">
    <h2>Monthly Sales Report</h2>
    <div class="report-controls">
      <label for="monthFilter">Select Month:</label>
      <input type="month" id="monthFilter">
    </div>
    <div id="monthlyReport" class="report-content"></div>
  </section>

  <template id="menuCardTemplate">
    <article class="menu-card">
      <img class="menu-image" alt="">
      <div class="menu-card-body">
        <h3 class="menu-name"></h3>
        <p class="menu-price"></p>
        <button class="btn btn-primary add-to-cart-btn">Add to Cart</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
